<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="25" flood-color="#00f2fe" flood-opacity="0.8"/>
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.9"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)" rx="225" />
  <text x="512" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="160" font-weight="900" fill="url(#textGlow)" filter="url(#neon)" text-anchor="middle" letter-spacing="4">DocVault</text>
</svg>
